# Full wasm component smoke — the HEAVY job (GitHub-hosted-runner oriented).
#
# This is NOT act-friendly: it needs wasi-sdk-33 + cargo-component + wac, the
# sibling tegmentum/duckdb-wasm repo (the DuckDB-wasm core moved there), and a
# multi-minute build of the lean core + ~180 components. For local CI use ci.yml
# (the lightweight, act-runnable native checks); for the full suite locally run
# `python3 tooling/smoke.py --all --build` directly.
#
# NOTE: the build/smoke commands below are the ones used in development and are
# correct for the current architecture; the CI orchestration (the sibling
# checkout + a token for tegmentum/duckdb-wasm) has not yet been validated on a
# hosted runner. Manual-dispatch only until that is wired.
name: smoke-tests

on:
  workflow_dispatch:

env:
  WASI_SDK_RELEASE: wasi-sdk-33

jobs:
  wasm-preview2-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ducklink
        uses: actions/checkout@v4
        with:
          path: ducklink

      - name: Checkout the DuckDB-wasm core (sibling repo)
        uses: actions/checkout@v4
        with:
          repository: tegmentum/duckdb-wasm
          path: duckdb-wasm
          token: ${{ secrets.DUCKDB_WASM_TOKEN }}

      - name: Install Rust + the wasip2 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      # The tooling delegators (tooling/smoke.py, tooling/verify-catalog.py) import
      # the shared datalink_tooling engine. datalink is PUBLIC, so no token needed.
      - name: Install the shared datalink tooling
        working-directory: ducklink
        run: pip install -r requirements-dev.txt

      - name: Install component tooling
        run: |
          set -euo pipefail
          command -v cargo-component >/dev/null || cargo install cargo-component --locked
          command -v wac >/dev/null            || cargo install wac-cli --locked

      - name: Install wasi-sdk
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64) ARCH=x86_64 ;;
            aarch64|arm64) ARCH=arm64 ;;
            *) echo "unsupported arch $(uname -m)" >&2; exit 1 ;;
          esac
          curl -fsSL -o /tmp/wasi-sdk.tar.gz \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/${WASI_SDK_RELEASE}/${WASI_SDK_RELEASE}.0-${ARCH}-linux.tar.gz"
          mkdir -p "$HOME/wasi-sdk"
          tar xzf /tmp/wasi-sdk.tar.gz -C "$HOME/wasi-sdk" --strip-components=1

      # The lean core embeds nothing optional (EMBED_EXTENSIONS="" default);
      # official functionality ships as loadable components (json autoloaded).
      - name: Build the lean DuckDB-wasm core
        working-directory: duckdb-wasm
        run: |
          set -euo pipefail
          export WASI_SDK_PREFIX="$HOME/wasi-sdk"
          source scripts/setup-env.sh
          cargo component build -p duckdb-component-core --target wasm32-wasip2 --release --features wasi
          mkdir -p ../ducklink/target/wasm32-wasip2/release
          cp target/wasm32-wasip2/release/ducklink_core.wasm ../ducklink/target/wasm32-wasip2/release/

      - name: Build host + every component, then run the full smoke
        working-directory: ducklink
        run: |
          set -euo pipefail
          export WASI_SDK_PREFIX="$HOME/wasi-sdk"
          source ../duckdb-wasm/scripts/setup-env.sh
          cargo build --release -p ducklink-host
          # --build rebuilds each component + copies its artifact, then smokes.
          python3 tooling/smoke.py --all --build
          python3 tooling/verify-catalog.py
