# The `ducklink` DuckDB community extension (Direction 2): a native-DuckDB
# loadable extension that embeds wasmtime to run `duckdb:extension` WebAssembly
# components. Detached from the wasm component workspace (its own [workspace]
# table) because it builds for the NATIVE host triple with the DuckDB C
# Extension API, not wasm32-wasip2.
[package]
name = "ducklink-extension"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Run WebAssembly component extensions inside DuckDB"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]
name = "ducklink"

[features]
default = []
# Code that talks to the duckdb crate: the Direction-2 registration + dispatch
# bridge (reg_duckdb.rs). Pulled in by both build modes below.
duckdb-api = ["dep:duckdb", "duckdb/vscalar"]
# Build the loadable .duckdb_extension (links the DuckDB C Extension API, resolved
# by the loading process). The deployable artifact for community-extensions.
loadable = [
    "duckdb-api",
    "duckdb/loadable-extension",
    "dep:duckdb-loadable-macros",
    "dep:libduckdb-sys",
    "libduckdb-sys/loadable-extension",
]
# Compile an in-process DuckDB from source, for the end-to-end test
# (load a component, register its scalar, run SQL, dispatch back into wasm).
bundled = ["duckdb-api", "duckdb/bundled"]

[dependencies]
# The shared engine: the duckdb:extension bindgen, the neutral reg::* capture
# model, the callback registry, and the load_component loader. Same crate the
# Direction-1 host uses, so a component loads identically in both.
ducklink-runtime = { path = "../../crates/ducklink-runtime" }
# wasmtime to run the component. MUST match ducklink-runtime's pinned rev so the
# WasiCtx / generated bindings are the same types across the crate boundary.
wasmtime = { git = "https://github.com/bytecodealliance/wasmtime", rev = "1ec866079720e573fc2aa06947c84f6132010993", features = ["component-model"] }
wasmtime-wasi = { git = "https://github.com/bytecodealliance/wasmtime", rev = "1ec866079720e573fc2aa06947c84f6132010993" }
anyhow = "1"

# DuckDB C Extension API (loadable-extension build) — only when building the
# actual loadable artifact. Pinned to the DuckDB version community-extensions
# CI builds against; bumped per release.
# Features come from this crate's feature flags (duckdb-api / loadable / bundled),
# NOT here — listing loadable-extension here would force the function-pointer
# C-API binding even for the in-process `bundled` build.
duckdb = { version = "1.10504.0", optional = true, default-features = false }
duckdb-loadable-macros = { version = "1.10504.0", optional = true }
libduckdb-sys = { version = "1.10504.0", features = ["loadable-extension"], optional = true }

# Detach from the wasm component workspace one level up.
[workspace]
