[package]
name = "tera-component"
version = "0.1.0"
edition = "2021"
description = """
Jinja2/Django-style templating: tera_render(template, context_json) -> text,
tera_valid(template) -> boolean (tera crate).
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# Shared, DB-agnostic logic + capability declaration (datalink pull-up).
# This shim is GENERATED from the core by datalink-extcore::duckdb_shim!.
tera-core = { path = "../../../datalink/extensions/tera-core" }
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
