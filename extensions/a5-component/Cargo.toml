[package]
name = "a5-component"
version = "0.1.0"
edition = "2021"
description = """
A5 pentagonal DGGS global geospatial index: a5_lonlat_to_cell(lat, lon, res),
a5_cell_to_lat/lon, a5_cell_to_resolution, a5_cell_to_parent, a5_is_valid_cell,
a5_cell_to_hex / a5_hex_to_cell (a5 crate).
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# Shared, DB-agnostic logic + capability declaration (datalink pull-up).
# This shim is GENERATED from the core by datalink-extcore::duckdb_shim!.
a5-core = { path = "../../../datalink/extensions/a5-core" }
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
