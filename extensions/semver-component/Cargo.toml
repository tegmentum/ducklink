[package]
name = "semver-component"
version = "0.1.0"
edition = "2021"
description = """
Semantic-version validation, field extraction, and comparison
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
semver = "1.0"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
