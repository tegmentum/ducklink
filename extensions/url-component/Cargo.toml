[package]
name = "url-component"
version = "0.1.0"
edition = "2021"
description = """
URL parsing: extract scheme, host, port, path, query
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# default-features = false works; idna transitively brought in
url = "2.5"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
