[package]
name = "urlpattern-component"
version = "0.1.0"
edition = "2021"
description = """
WHATWG URLPattern matching: url_pattern_test / url_pattern_match
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
urlpattern = "0.6"
url = "2"
regex = "1"
serde_json = "1"
# major-4 columnar bridge for hand-written components (colvec <-> row adapter).
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
