[package]
name = "tiktoken-component"
version = "0.1.0"
edition = "2021"
description = """
OpenAI BPE tokenization (tiktoken)
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
tiktoken-rs = "0.6"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
