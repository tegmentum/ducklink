[package]
name = "shapefile-component"
version = "0.1.0"
edition = "2021"
description = """
Read ESRI .shp shapefiles: read_shp(data BLOB) -> table (shape_no, shape_type, wkt).
One row per shape, geometry rendered as WKT (shapefile crate, geometry only).
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
shapefile = "0.8"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
