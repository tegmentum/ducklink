[package]
name = "unicodenorm-component"
version = "0.1.0"
edition = "2021"
description = """
Unicode NFC/NFD/NFKC/NFKD
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
unicode-normalization = "*"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
