[package]
name = "idna-component"
version = "0.1.0"
edition = "2021"
description = """
IDNA / punycode domain conversion
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# Use features = ['compiled_data','alloc'] with default-features = false
idna = "1.1"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
