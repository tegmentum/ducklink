[package]
name = "stdsql-component"
version = "0.1.0"
edition = "2021"
description = """
Cross-dialect standard-SQL scalars not in DuckDB builtins: space, initcap, the
ClickHouse camelCase family (startsWith/endsWith/lengthUTF8/lowerUTF8/upperUTF8/
toString/empty/notEmpty/replaceAll/positionUTF8) and the PostgreSQL to_bin/to_oct/
to_ascii/quote_ident/quote_literal/quote_nullable/get_byte/set_byte.
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# Shared, DB-agnostic logic + capability declaration (datalink pull-up).
# This shim is GENERATED from the core by datalink-extcore::duckdb_shim!.
stdsql-core = { path = "../../../datalink/extensions/stdsql-core" }
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
