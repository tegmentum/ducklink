[package]
name = "postgreswasm-component"
version = "0.1.0"
edition = "2021"
description = """
PostgreSQL scanner over wasi:sockets. A minimal hand-rolled PostgreSQL v3 wire
protocol client (plaintext, trust/cleartext/md5 auth) backs ATTACH '<dsn>'
(TYPE postgreswasm), serving the server's tables through the storage (ATTACH /
pushdown-scan) WIT interface. Connects over std::net (wasi:sockets); needs the
network capability grant.
"""
license = "MIT"
publish = false

[lib]
name = "postgreswasm"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
md5 = "0.7"
# major-4 columnar stub for hand-written non-scalar components.
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension-storage"

# Standalone manifest: kept OUT of the root workspace (which doesn't list this
# component) without editing the root Cargo.toml.
[workspace]
