[package]
name = "mailto-component"
version = "0.1.0"
edition = "2021"
description = """
mailto: URI parser (RFC 6068)
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
percent-encoding = "2.3"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
