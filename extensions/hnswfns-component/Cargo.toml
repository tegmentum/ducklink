[package]
name = "hnswfns-component"
version = "0.1.0"
edition = "2021"
description = """
Custom HNSW vector index (Item 3 / M2a): builds an approximate-nearest-neighbour
index from a table's FLOAT[N] rows via the index (CREATE INDEX ... USING
wasm_hnsw) WIT surface, and exposes an explicit kNN search as the hnsw_search
table function. The HNSW map is built in-component with the pure-Rust
instant-distance crate (compiled to wasm), behind the index-dispatch boundary.
"""
license = "MIT"
publish = false

[lib]
name = "hnswfns"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
instant-distance = "0.6"
serde_json = "1"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension-index"
