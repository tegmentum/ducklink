[package]
name = "rhai-component"
version = "0.1.0"
edition = "2021"
description = """
Evaluate a Rhai expression as a SQL scalar
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# Pure-Rust embedded scripting. Disable default features to drop anything that
# pulls in std time / filesystem / threading; keep only the minimal evaluator.
rhai = { version = "1", default-features = false, features = ["sync", "only_i64", "no_closure", "no_custom_syntax"] }
# major-4 columnar bridge for hand-written scalar components (colvec <-> row).
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"

# Keep the wasm small.
[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"
