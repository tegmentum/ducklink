[package]
name = "rtreefns-component"
version = "0.1.0"
edition = "2021"
description = """
Custom spatial R-tree index (Item 3 / deferred spatial keystone): builds an
R-tree from a table's FLOAT[4] bbox rows (minx,miny,maxx,maxy per row) via the
SAME index (CREATE INDEX ... USING wasm_rtree) WIT surface HNSW uses, and exposes
an explicit rtree_search table function returning the rowids whose indexed bbox
INTERSECTS a query bbox. The R-tree is built in-component with the pure-Rust
rstar crate (compiled to wasm), behind the identical index-dispatch boundary --
proving the index capability is GENERAL (one WIT serves HNSW + R-tree, zero core
change). A bbox4(wkt) -> VARCHAR helper builds the bbox JSON from WKT geometry.
"""
license = "MIT"
publish = false

[lib]
name = "rtreefns"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# Pin to 0.12 to match the rstar that geo 0.29 pulls in transitively (avoids two
# incompatible rstar versions in the graph).
rstar = "0.12"
serde_json = "1"
geo = "0.29"
wkt = "0.13"
# major-4 columnar scalar bridge (colvec <-> row) for the hybrid scalar+table impl.
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension-index"
