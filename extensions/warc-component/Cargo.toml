[package]
name = "warc-component"
version = "0.1.0"
edition = "2021"
description = """
Read WARC (Web ARChive, ISO 28500) files: read_warc(data BLOB) -> table
(record_no, warc_type, target_uri, content_type, content_length) -- one row
per record's header fields (bodies are skipped to keep rows small) (warc crate).
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
warc = { version = "0.4", default-features = false }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
