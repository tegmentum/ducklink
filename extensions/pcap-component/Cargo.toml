[package]
name = "pcap-component"
version = "0.1.0"
edition = "2021"
description = """
Read PCAP / PCAPNG capture files: read_pcap(data BLOB) -> table
(idx, ts_sec, ts_usec, caplen, origlen, data) -- one row per packet,
data is the raw captured bytes (pcap-parser crate).
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
pcap-parser = "0.17"
# major-4 columnar bridge for hand-written components (colvec <-> row adapter).
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
