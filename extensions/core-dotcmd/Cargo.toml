[package]
name = "core-dotcmd"
version = "0.1.0"
edition = "2021"
description = "Pluggable dot-command component using spi (SQL on the live connection)"
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"

[package.metadata.component]
package = "duckdb:dotcmd"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:dotcmd/dotcmd"
