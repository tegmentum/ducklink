[package]
name = "magic-component"
version = "0.1.0"
edition = "2021"
description = """
File content-type sniffing from magic bytes (libmagic-style) via the pure-Rust
`infer` crate: magic_mime / magic_extension / magic_matcher_type / is_image.
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# Shared, DB-agnostic logic + capability declaration (datalink pull-up).
magic-core = { path = "../../../datalink/extensions/magic-core" }
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
