[package]
name = "simhash-component"
version = "0.1.0"
edition = "2021"
description = """
SimHash locality-sensitive fingerprint (hand-rolled)
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# major-4 columnar bridge (UBIGINT return is outside the neutral pull-up types).
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
