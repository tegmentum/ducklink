[package]
name = "s3fs-component"
version = "0.1.0"
edition = "2021"
description = """
s3fs M2 files backend: fetch s3:// objects over HTTPS (wasi:sockets + rustls)
with AWS SigV4 auth (or anonymous for public buckets) and serve them to DuckDB's
WasmFileSystem (read_csv/read_parquet('s3://...')).
"""
license = "MIT"
publish = false

# Detached from the parent workspace (which lists members explicitly and must
# not be edited). Built standalone via `cargo component build` in this dir.
[workspace]

[lib]
name = "s3fs"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# Pure-Rust TLS stack, identical to httpclient-component (builds for wasip2).
rustls = { version = "0.23", default-features = false, features = ["std", "tls12"] }
rustls-rustcrypto = "0.0.2-alpha"
webpki-roots = "0.26"
# SigV4 signing primitives, hand-rolled on these (no_std-friendly, build cleanly
# for wasip2 — far lighter than the full aws-sigv4 / aws-smithy runtime stack).
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"
# major-4 columnar bridge for the hand-written marker scalar (colvec <-> row).
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension-files"
