[package]
name = "emoji-component"
version = "0.1.0"
edition = "2021"
description = """
Emoji name + shortcode lookup
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# Full Unicode 16 table compiled in (~600 KB component contribution)
emojis = "0.8"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
