[package]
name = "numstream-component"
version = "0.1.0"
edition = "2021"
description = """
Streaming + FILTER-PUSHDOWN-capable table function (v3.1.0 additive-minor proof):
numstream(n) emits v = 0..n-1 and prunes rows at the source from the pushed-down
conjunctive filter set, driving table-stream-dispatch.call-table-open-filtered.
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension-table-stream"
