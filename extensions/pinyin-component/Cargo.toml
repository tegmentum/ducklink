[package]
name = "pinyin-component"
version = "0.1.0"
edition = "2021"
description = """
Chinese Hanzi -> pinyin romanization (with tone marks, plain, initials)
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# Shared, DB-agnostic logic + capability declaration (datalink pull-up).
pinyin-core = { path = "../../../datalink/extensions/pinyin-core" }
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"

[profile.release]
opt-level = "z"
lto = true
strip = true
