[package]
name = "ftsfns-component"
version = "0.1.0"
edition = "2021"
description = """
Full-text-search function layer: tokenize, stem, BM25 scoring, AND match
"""
license = "MIT"
publish = false

[lib]
name = "ftsfns"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
rust-stemmers = "1"
serde_json = "1"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
