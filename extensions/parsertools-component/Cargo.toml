[package]
name = "parsertools-component"
version = "0.1.0"
edition = "2021"
description = """
Extract structure from SQL text (sqlparser-rs)
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
sqlparser = { version = "0.62", features = ["visitor"] }
serde_json = "1"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
