[package]
name = "spatialfns-component"
version = "0.1.0"
edition = "2021"
description = """
A useful subset of DuckDB's spatial ST_* functions (WKT text I/O), pure Rust.
"""
license = "MIT"
publish = false

[lib]
name = "spatialfns"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
geo = "0.29"
wkt = "0.13"
geojson = "0.24"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"

[profile.release]
opt-level = "z"
lto = true
strip = true
