[package]
name = "ggsql-component"
version = "0.1.0"
edition = "2021"
description = """
ggsql / VISUALIZE parser-extension PoC (2.3.0 / v3). Proves the by-value-safe
parser surface end to end: registers a parser extension in load(), and on a
`VISUALIZE <select>` statement the built-in parser rejects, rewrites it to ordinary
DuckDB SQL (a grouped count over the select) via parser-dispatch.call-parse. No
bound parse tree crosses the boundary -- text in, SQL text out.
"""
license = "MIT"
publish = false

[lib]
name = "ggsql"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# Shared, DB-agnostic VISUALIZE parse/rewrite logic (datalink pull-up).
# This shim only maps the core's neutral Outcome onto the duckdb:extension
# parser-dispatch surface; the rewrite engine lives ONCE in the core.
ggsql-core = { path = "../../../datalink/extensions/ggsql-core" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension-parser"
