[package]
name = "openprompt-component"
version = "0.1.0"
edition = "2021"
description = """
Call an OpenAI-compatible chat-completions HTTP API as DuckDB scalars,
over the wasi:sockets graft (TLS via rustls). Network-gated.
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
rustls = { version = "0.23", default-features = false, features = ["std", "tls12"] }
rustls-rustcrypto = "0.0.2-alpha"
webpki-roots = "0.26"
serde_json = "1"
# major-4 columnar bridge for hand-written components (colvec <-> row adapter).
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
