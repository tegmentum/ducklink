[package]
name = "statsduck-component"
version = "0.1.0"
edition = "2021"
description = """
Classical statistics for DuckDB, componentized from the `the-stats-duck`
community extension: hypothesis tests (t-tests, Mann-Whitney U, Wilcoxon,
sign, ANOVA, chi-square, Jarque-Bera, KS), correlation tests (Pearson,
Spearman), multiple-testing correction, and the test-supporting distribution
CDFs (Student t / chi-square / F / gamma / Weibull / log-normal) that the
lean core and the `stochastic` component do not already provide.
Samples cross the scalar WIT boundary as JSON number arrays (VARCHAR);
multi-value results are returned as a JSON object (VARCHAR).
"""
license = "MIT"
publish = false

[lib]
name = "statsduck"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# statrs: proven on wasm32-wasip2 (already used by the stochastic component).
# Provides StudentsT / ChiSquared / FisherSnedecor / Gamma / Weibull /
# LogNormal CDFs that back the test p-values and the new distribution scalars.
statrs = "0.18"
# Pure-Rust JSON: parse the "[1.0, 2.0, ...]" sample arguments and render the
# {statistic, p_value, ...} result objects. No CC; builds clean for wasip2.
serde_json = "1"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
