[package]
name = "textdiff-component"
version = "0.1.0"
edition = "2021"
description = """
Text diffing (line-based) via the `similar` crate
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
similar = "2"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
