[package]
name = "stats-component"
version = "0.1.0"
edition = "2021"
description = """
Percentile aggregates not in DuckDB's plain catalog: percentile(value, p),
percentile_cont(value, p), percentile_disc(value, p), all with p in 0..100.
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# Shared, DB-agnostic logic + capability declaration (datalink pull-up).
# This shim is GENERATED from the core by datalink-extcore::duckdb_agg_shim!.
stats-core = { path = "../../../datalink/extensions/stats-core" }
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
