[package]
name = "icufns-component"
version = "0.1.0"
edition = "2021"
description = """
ICU-style language-sensitive collation scalars (via `icu_collator`, ICU4X):
icu_sort_key(text, locale) -> hex collation sort key (ORDER BY workaround for
real COLLATE), icu_compare(a, b, locale) -> -1/0/1, icu_casefold(text) -> text.
NULL / invalid -> NULL.
"""
license = "MIT"
publish = false

[lib]
name = "icufns"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
icu_collator = "2"
icu_locale_core = "2"
caseless = "0.2"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"

[profile.release]
opt-level = "s"
lto = true
strip = true
