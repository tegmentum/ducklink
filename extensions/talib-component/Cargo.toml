# Detached from the parent ducklink workspace via its own `[workspace]` table
# (an independent lockfile). talib-core + the window template now live in
# datalink main (merged from feat/talib-window), so the path deps resolve
# against `~/git/datalink` like the rest of the workspace.
# Same technique aba/baseN use for the embed path. `cargo component build`
# from this dir still produces the wasi component.
[workspace]

[package]
name = "talib-component"
version = "0.1.0"
edition = "2021"
description = """
TA-Lib style technical indicators as window functions (sma/ema/rsi)
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# Shared, DB-agnostic logic + capability declaration (datalink pull-up).
# This shim is GENERATED from the core by datalink-extcore::duckdb_agg_shim!.
talib-core = { path = "../../../datalink/extensions/talib-core" }
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
