[package]
name = "crypto-component"
version = "0.1.0"
edition = "2021"
description = """
Hash digests beyond DuckDB's md5/sha256: sha1, sha512, sha3-256, blake3, crc32
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
sha1 = "0.10"
sha2 = "0.10"
sha3 = "0.10"
blake3 = "1"
crc32fast = "1"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
