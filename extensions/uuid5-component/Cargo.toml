[package]
name = "uuid5-component"
version = "0.1.0"
edition = "2021"
description = """
Namespace UUIDv3/v5 (deterministic)
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
uuid = { version = "1", features = ["v3", "v5"] }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
