[package]
name = "icebergscan-component"
version = "0.1.0"
edition = "2021"
description = """
Inspect Apache Iceberg table metadata. Takes the top-level metadata.json
(metadata/vNNN.metadata.json) as VARCHAR text and exposes three table fns:
  iceberg_metadata(metadata_json VARCHAR)  -> table(key, value)
  iceberg_schema(metadata_json VARCHAR)    -> table(field_id, name, type, required)
  iceberg_snapshots(metadata_json VARCHAR) -> table(snapshot_id, sequence_number, timestamp_ms, manifest_list)
A metadata reader only: the manifest-list / manifests (Avro) and the Parquet
data files are NOT followed (that needs host file access). NULL / invalid JSON
yields zero rows, never a panic. Pure-Rust serde_json.
"""
license = "MIT"
publish = false

[lib]
name = "icebergscan"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# Pure-Rust JSON parser; builds clean for wasm32-wasip2 with no CC.
serde_json = "1"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
