[package]
name = "frequentitems-component"
version = "0.1.0"
edition = "2021"
description = """
Top-K heavy-hitters / frequent-items estimation over a JSON array
"""
license = "MIT"
publish = false

[lib]
name = "frequentitems"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
serde_json = "1"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
