[package]
name = "pluscode-component"
version = "0.1.0"
edition = "2021"
description = """
Open Location Code (plus codes)
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
open-location-code = "*"
geo = "0.4"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
