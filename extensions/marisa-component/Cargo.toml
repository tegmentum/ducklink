[package]
name = "marisa-component"
version = "0.1.0"
edition = "2021"
description = """
Trie-backed string set lookup / prefix search via the fst crate
"""
license = "MIT"
publish = false

[lib]
name = "marisa"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
fst = "0.4"
serde_json = "1"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
