[package]
name = "secp256k1-component"
version = "0.1.0"
edition = "2021"
description = """
ECDSA on the secp256k1 curve: pubkey derivation, deterministic (RFC 6979) sign, and verify (k256).
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# Shared, DB-agnostic logic + capability declaration (datalink pull-up).
# This shim is GENERATED from the core by datalink-extcore::duckdb_shim!.
secp256k1-core = { path = "../../../datalink/extensions/secp256k1-core" }
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
