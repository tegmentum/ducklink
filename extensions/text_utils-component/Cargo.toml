[package]
name = "text_utils-component"
version = "0.1.0"
edition = "2021"
description = """
Cross-dialect string scalars not in DuckDB builtins: sql_normalize, insert (MySQL), locate(2)/locate(3)
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# Shared, DB-agnostic logic + capability declaration (datalink pull-up).
# This shim is GENERATED from the core by datalink-extcore::duckdb_shim!.
text-utils-core = { path = "../../../datalink/extensions/text-utils-core" }
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
