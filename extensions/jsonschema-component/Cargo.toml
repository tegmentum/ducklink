[package]
name = "jsonschema-component"
version = "0.1.0"
edition = "2021"
description = """
JSON Schema validation
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
jsonschema = "0.46"
serde_json = "1"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
