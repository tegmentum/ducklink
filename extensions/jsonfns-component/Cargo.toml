[package]
name = "jsonfns-component"
version = "0.1.0"
edition = "2021"
description = """
DuckDB json scalar functions (json_valid, json_extract, json_array_length, ...)
reimplemented as a ducklink component, meant to replace the embedded json
scalars once they are de-embedded from the lean core.
"""
license = "MIT"
publish = false

[lib]
name = "jsonfns"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
serde_json = "1"
serde_json_path = "0.7"
# major-4 columnar bridge for hand-written components (colvec <-> row adapter).
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
