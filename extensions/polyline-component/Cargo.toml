[package]
name = "polyline-component"
version = "0.1.0"
edition = "2021"
description = """
Google Encoded Polyline encode/decode
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
polyline = "0.11"
geo-types = "0.7"
serde_json = "1"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
