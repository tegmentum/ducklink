[package]
name = "tpchgen-component"
version = "0.1.0"
edition = "2021"
description = """
Generate TPC-H benchmark data as DuckDB table functions (pure-Rust tpchgen
crate). tpch_region()/tpch_nation() are the fixed reference tables; the six
scaled tables -- tpch_supplier(sf), tpch_customer(sf), tpch_part(sf),
tpch_partsupp(sf), tpch_orders(sf), tpch_lineitem(sf) -- take a DOUBLE scale
factor. tpch_query(n BIGINT) -> VARCHAR returns the SQL text of TPC-H query n.
"""
license = "MIT"
publish = false

[lib]
name = "tpchgen"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
tpchgen = "2.0"
# major-4 columnar bridge for hand-written components (colvec <-> row adapter).
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
