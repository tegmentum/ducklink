[package]
name = "ion-component"
version = "0.1.0"
edition = "2021"
description = """
Amazon Ion <-> JSON conversion (ion_to_json, ion_from_json, ion_get)
"""
license = "MIT"
publish = false

[lib]
name = "ion"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
ion-rs = "1.0"
serde_json = "1"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
