[package]
name = "parquetfns-component"
version = "0.1.0"
edition = "2021"
description = """
Read Apache Parquet files handed in as an in-memory BLOB:
  parquet_schema(data BLOB)   -> table(column_name VARCHAR, column_type VARCHAR)
  parquet_metadata(data BLOB) -> table(num_rows, num_columns, num_row_groups, ...)
  read_parquet(data BLOB)     -> table(row_no BIGINT, col VARCHAR, val VARCHAR)  -- MELTED
Reimplements the feasible parts of DuckDB's official `parquet` extension as a
loadable ducklink component (Rust `parquet` crate, pure-Rust feature set:
SNAPPY + flate2, no arrow/async/C-deps). Collides with the embedded core
registrations, so usable only against a lean core.
"""
license = "MIT"
publish = false

# Standalone component: do not get vacuumed into a parent workspace.
[workspace]

[lib]
name = "parquetfns"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# Pure-Rust feature set that builds for wasm32-wasip2: no `arrow`, no `async`,
# no C-backed codecs (zstd/lz4). `snap` (SNAPPY) and `flate2` (GZIP) are pure
# Rust; uncompressed always works.
parquet = { version = "53", default-features = false, features = ["snap", "flate2"] }
bytes = "1"

[dev-dependencies]
# In native tests we WRITE a tiny parquet file in-memory to drive the readers;
# the same pure-Rust feature set is fine for the writer.
parquet = { version = "53", default-features = false, features = ["snap", "flate2"] }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
