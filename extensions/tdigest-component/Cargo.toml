[package]
name = "tdigest-component"
version = "0.1.0"
edition = "2021"
description = """
t-digest quantile estimation (aggregate build + quantile/count scalars)
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# Shared, DB-agnostic logic + capability declaration (datalink pull-up).
# This shim is GENERATED from the core by datalink-extcore::duckdb_agg_shim!.
# The tdigest/bincode codec deps moved to the core.
tdigest-core = { path = "../../../datalink/extensions/tdigest-core" }
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
