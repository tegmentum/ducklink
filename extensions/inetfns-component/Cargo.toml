[package]
name = "inetfns-component"
version = "0.1.0"
edition = "2021"
description = """
DuckDB inet scalar surface (host/family/netmask/network/broadcast/contains)
"""
license = "MIT"
publish = false

[lib]
name = "inetfns"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
ipnetwork = "0.21"
# major-4 columnar bridge for hand-written components (colvec <-> row adapter).
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
