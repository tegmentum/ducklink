[package]
name = "inetfns-component"
version = "0.1.0"
edition = "2021"
description = """
DuckDB inet scalar surface (host/family/netmask/network/broadcast/contains)
"""
license = "MIT"
publish = false

# Standalone: not a member of the root workspace.
[workspace]

[lib]
name = "inetfns"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
ipnetwork = "0.21"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
