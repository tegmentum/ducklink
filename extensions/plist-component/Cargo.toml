[package]
name = "plist-component"
version = "0.1.0"
edition = "2021"
description = """
Apple property-list (plist) parsing: plist_to_json, plist_get
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
plist = "*"
serde_json = "*"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
