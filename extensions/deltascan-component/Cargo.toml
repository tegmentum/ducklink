[package]
name = "deltascan-component"
version = "0.1.0"
edition = "2021"
description = """
Inspect a Delta Lake table's transaction log (the _delta_log/*.json JSON-lines)
from in-memory text/BLOB. delta_log_info(log_json) -> table(version, action,
path, size) emits every protocol/metaData/add/remove action; delta_schema
(log_json) -> table(column_name, column_type) parses the metaData action's
Delta schemaString into columns. A component cannot list a directory, so the
concatenated _delta_log is supplied as the argument. Parsing only (serde_json);
NULL/invalid -> zero rows, never a panic. Reading the parquet DATA referenced by
the log is out of scope (would compose the add-file list with the lean core's
read_parquet, driven by a host directory listing).
"""
license = "MIT"
publish = false

[lib]
name = "deltascan"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
serde_json = "1"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
