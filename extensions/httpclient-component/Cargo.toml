[package]
name = "httpclient-component"
version = "0.1.0"
edition = "2021"
description = """
HTTP/HTTPS client over wasi:sockets (GET/POST), pure-Rust TLS
"""
license = "MIT"
publish = false

[lib]
name = "httpclient"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
rustls = { version = "0.23", default-features = false, features = ["std", "tls12"] }
rustls-rustcrypto = "0.0.2-alpha"
webpki-roots = "0.26"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
