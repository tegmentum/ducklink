[package]
name = "hmac-component"
version = "0.1.0"
edition = "2021"
description = """
Keyed HMAC (SHA-256/512)
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
