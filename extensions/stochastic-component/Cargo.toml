[package]
name = "stochastic-component"
version = "0.1.0"
edition = "2021"
description = """
Statistical probability-distribution functions (PDF/CDF/quantile) via statrs
"""
license = "MIT"
publish = false

[lib]
name = "stochastic"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# Shared, DB-agnostic logic + capability declaration (datalink pull-up).
stochastic-core = { path = "../../../datalink/extensions/stochastic-core" }
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
