[package]
name = "mysqlwasm-component"
version = "0.1.0"
edition = "2021"
description = """
MySQL/MariaDB scanner over wasi:sockets. A minimal hand-rolled MySQL wire
protocol client (plaintext, mysql_native_password) backs ATTACH '<dsn>'
(TYPE mysql), serving the server's tables through the storage (ATTACH /
pushdown-scan) WIT interface. Connects over std::net (wasi:sockets); needs the
network capability grant.
"""
license = "MIT"
publish = false

[lib]
name = "mysqlwasm"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
sha1 = "0.10"
# major-4 columnar bridge for hand-written components (colvec stub adapter).
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension-storage"

# Standalone manifest: kept OUT of the root workspace (which doesn't list this
# component) without editing the root Cargo.toml.
[workspace]
