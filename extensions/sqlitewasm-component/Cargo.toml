[package]
name = "sqlitewasm-component"
version = "0.1.0"
edition = "2021"
description = """
SQLite scanner: SQLite (C) compiled to wasm inside the component, serving DuckDB
through the storage (ATTACH/pushdown-scan) WIT interface plus a sqlite_scan
table function. Reads a SQLite DB handed over as a BLOB (sqlite3_deserialize).
"""
license = "MIT"
publish = false

[lib]
name = "sqlitewasm"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
rusqlite = { version = "0.32", features = ["bundled", "column_decltype"] }
libsqlite3-sys = "0.30"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension-storage"
