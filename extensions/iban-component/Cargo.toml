[package]
name = "iban-component"
version = "0.1.0"
edition = "2021"
description = """
IBAN (ISO 13616) validation, country, and BBAN extraction via mod-97
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# add your upstream crate deps here

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
