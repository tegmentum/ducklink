[package]
name = "spatialproj-component"
version = "0.1.0"
edition = "2021"
description = """
ST_Transform (coordinate reprojection) via the single resident, shared
compose:dynlink gdal provider (GDAL/PROJ + proj.db loaded once, not wac-inlined).
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
rmp-serde = "1"
serde = { version = "1", features = ["derive"] }
# major-4 columnar bridge for hand-written components (colvec <-> row adapter).
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "spatialproj"

[package.metadata.component.target.dependencies]
"compose:dynlink" = { path = "wit/deps/compose-dynlink.wit" }
"sys:compose" = { path = "wit/deps/sys-compose.wit" }
