[package]
name = "spatialproj-component"
version = "0.1.0"
edition = "2021"
description = """
ST_Transform (coordinate reprojection) via the composed GDAL/PROJ component.
Proves inter-component composition: a duckdb:extension that imports gdal:core/srs.
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
wkt = "0.10"
geo-types = "0.7"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "spatialproj"

# The gdal:core WIT package is a target dependency: spatialproj imports
# gdal:core/srs, which is satisfied at composition time by gdal.component.wasm.
[package.metadata.component.target.dependencies]
"gdal:core" = { path = "wit/deps/gdal.wit" }
