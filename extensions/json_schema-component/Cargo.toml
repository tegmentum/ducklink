[package]
name = "json_schema-component"
version = "0.1.0"
edition = "2021"
description = """
JSON Schema validation
"""
license = "MIT"
publish = false

[lib]
name = "json_schema"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# default-features = false drops the `resolve-http` feature (reqwest / network)
# that does not build for wasm32-wasip2. Local validation + format checks remain.
jsonschema = { version = "0.46", default-features = false }
serde_json = "1"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
