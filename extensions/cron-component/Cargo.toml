[package]
name = "cron-component"
version = "0.1.0"
edition = "2021"
description = """
Cron expression evaluation: cron_is_valid(expr) -> boolean, cron_next(expr, after_unix_ms) -> bigint, cron_prev(expr, before_unix_ms) -> bigint (croner crate, UTC, deterministic).
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
croner = "3"
chrono = { version = "0.4", default-features = false, features = ["alloc"] }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"
