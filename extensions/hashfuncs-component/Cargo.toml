[package]
name = "hashfuncs-component"
version = "0.1.0"
edition = "2021"
description = """
Non-cryptographic hashes: xxHash (32/64/3) and MurmurHash3
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
twox-hash = { version = "2.1", default-features = false, features = ["xxhash32", "xxhash64", "xxhash3_64", "std"] }
murmur3 = "0.5"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
