[package]
name = "vssfns-component"
version = "0.1.0"
edition = "2021"
description = """
The genuinely-missing vector math from DuckDB's `vss` extension, as scalars over
arrays passed as JSON number arrays (the WIT surface is scalar-only):
  vec_l1_distance(a VARCHAR, b VARCHAR)  -> DOUBLE  (Manhattan / L1)
  vec_linf_distance(a VARCHAR, b VARCHAR)-> DOUBLE  (Chebyshev / L-infinity)
  vec_normalize(a VARCHAR)               -> VARCHAR (unit vector, JSON array)
NOTE: vss's L2 / cosine / inner-product distances are ALREADY in lean
core_functions (array_distance, array_cosine_distance, array_inner_product,
array_dot_product, ... and their list_ variants), so reimplementing them here
would COLLIDE. This component ships only the non-core gaps. vss's actual value,
the HNSW approximate-nearest-neighbour INDEX, cannot be a component: there is no
custom-index WIT surface.
"""
license = "MIT"
publish = false

[lib]
name = "vssfns"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# Shared, DB-agnostic logic + capability declaration (datalink pull-up).
vssfns-core = { path = "../../../datalink/extensions/vssfns-core" }
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
