[package]
name = "webfs-component"
version = "0.1.0"
edition = "2021"
description = """
httpfs M2 files backend: fetch http(s):// resources over wasi:sockets and serve
them to DuckDB's WasmFileSystem (read_csv('http://...'), etc.).
"""
license = "MIT"
publish = false

# Detached from the parent workspace (which lists members explicitly and must
# not be edited). Built standalone via `cargo component build` in this dir.
[workspace]

[lib]
name = "webfs"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension-files"
