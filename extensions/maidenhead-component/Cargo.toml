[package]
name = "maidenhead-component"
version = "0.1.0"
edition = "2021"
description = """
Maidenhead grid locator (ham radio): to_maidenhead(lat, lon, precision) -> text,
maidenhead_lat / maidenhead_lon -> double (grid-square center). Hand-rolled math.
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# Shared, DB-agnostic logic + capability declaration (datalink pull-up).
maidenhead-core = { path = "../../../datalink/extensions/maidenhead-core" }
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"

[profile.release]
opt-level = "s"
lto = true
strip = true
