[package]
name = "csscolor-component"
version = "0.1.0"
edition = "2021"
description = """
CSS color parsing and conversion: any CSS color -> hex / rgb, plus validity
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# Use features = ['named-colors'] with default-features = false
csscolorparser = "0.8"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
