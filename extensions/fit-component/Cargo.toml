[package]
name = "fit-component"
version = "0.1.0"
edition = "2021"
description = """
Read Garmin/ANT .FIT activity files: read_fit(data BLOB) -> table
(record_no, kind, field, value) in melted/long form, every field rendered
as VARCHAR (fitparser crate).
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# major-4 columnar bridge stub (table-only component, no hot-path callbacks).
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }
fitparser = "0.11"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
