[package]
name = "netquack-component"
version = "0.1.0"
edition = "2021"
description = """
Public-suffix-aware URL/domain parsing (registrable domain / eTLD+1)
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
psl = "2"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
