[package]
name = "uuid7-component"
version = "0.1.0"
edition = "2021"
description = """
UUIDv7 (RFC 9562, time-ordered): deterministic build from timestamp + random hex, extract timestamp, validate.
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
uuid = "1"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
