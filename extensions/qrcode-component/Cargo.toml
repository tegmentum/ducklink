[package]
name = "qrcode-component"
version = "0.1.0"
edition = "2021"
description = """
QR code generation (SVG)
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
qrcode = { version = "0.14", default-features = false, features = ["svg"] }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
