[package]
name = "timezone-component"
version = "0.1.0"
edition = "2021"
description = """
IANA timezone offset lookups
"""
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
chrono-tz = "0.10"
# Use features = ['clock'] with default-features = false to keep tz tables out
chrono = "0.4"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"
