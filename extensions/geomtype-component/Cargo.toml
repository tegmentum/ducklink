[package]
name = "geomtype-component"
version = "0.1.0"
edition = "2021"
description = """
A COHERENT custom logical type for DuckDB-wasm: a `geometry` type (BLOB-physical,
WKB bytes) with VARCHAR<->geometry casts (WKT<->WKB) plus typed scalars that
consume it. Proves the register-logical-type + register-cast WIT surface. Pure Rust.
"""
license = "MIT"
publish = false

[lib]
name = "geomtype"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
geo = "0.29"
wkt = "0.13"
byteorder = "1"

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension"

[profile.release]
opt-level = "z"
lto = true
strip = true
