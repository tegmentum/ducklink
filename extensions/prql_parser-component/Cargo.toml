[package]
name = "prql-parser-component"
version = "0.1.0"
edition = "2021"
description = """
prql TRANSPARENT parser extension (duckdb:extension parser-dispatch). The
existing prql-component ships an explicit prql_to_sql(prql) scalar; THIS
component is the transparent upgrade: it registers a parser extension in load(),
and on a bare `from x | filter .. | select ..` statement the built-in parser
rejects, compiles the PRQL to ordinary DuckDB SQL via parser-dispatch.call-parse
so it runs directly. The PRQL compile (prqlc, dialect-parameterized) lives ONCE
in the shared datalink prql-core (the same core the sqlink shim consumes); this
shim only maps the neutral Outcome onto the duckdb:extension parser-dispatch
surface. Merging this with the scalar prql-component into one dual-capability
extension is a catalog-integration follow-on.
"""
license = "MIT"
publish = false

[lib]
name = "prql_parser"
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.41"
wit-bindgen-rt = "0.41"
# Shared, DB-agnostic transparent PRQL->SQL transpiler (datalink pull-up,
# wraps prqlc). This shim only maps the core's neutral Outcome onto the
# duckdb:extension parser-dispatch surface; the compiler lives ONCE in the core.
prql-core = { path = "../../../datalink/extensions/prql-core" }
# major-4 columnar stub for hand-written non-scalar components.
datalink-extcore = { path = "../../../datalink/crates/datalink-extcore" }

[package.metadata.component]
package = "duckdb:extension"

[package.metadata.component.target]
path = "./wit"
world = "duckdb:extension/duckdb-extension-parser"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"
